name: CI

# mainブランチへのPR時にlint・buildを実行するCI
on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # ダミーURL（generate/buildはDB接続しないため形式のみ据置)
      DATABASE_URL: 'mysql://user:password@localhost:3306/db'
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: VMにNodeをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 依存をインストール
        run: npm ci

      - name: Prisma Clientで型生成
        run: npx prisma generate

      - name: Lintを実行
        run: npm run lint

      - name: ビルドで型・SSRエラーを検知
        run: npm run build
